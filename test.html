<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Vault • 230k+ Random Words</title>
    
    <!-- Discord Embed Trick Meta Tags (this makes the shared link look like a clean image embed) -->
    <meta property="og:title" content="Word Vault">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://picsum.photos/id/201/1200/630"> <!-- Replace this URL with your own hosted image for a custom look -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourusername.github.io/wordvault/"> <!-- Update to your actual site URL -->
    
    <!-- Twitter/Discord fallback for large image card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Word Vault">
    <meta name="twitter:description" content=" ">
    <meta name="twitter:image" content="https://picsum.photos/id/201/1200/630">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0f0f0f;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        
        .container {
            max-width: 800px;
            padding: 2rem;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        
        #word {
            font-size: 6rem;
            font-weight: 700;
            margin: 2rem 0;
            min-height: 7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            transition: all 0.3s ease;
        }
        
        button {
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.5);
        }
        
        .info {
            margin-top: 3rem;
            opacity: 0.6;
            font-size: 1rem;
        }
        
        .copy-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="copy-btn" onclick="copyWord()">📋 Copy</button>
        
        <h1>Word Vault</h1>
        <p class="subtitle">230,000+ English words • One random word at a time</p>
        
        <div id="word">loading the vault...</div>
        
        <button onclick="newWord()">NEW RANDOM WORD</button>
        
        <div class="info">
            Powered by <a href="https://raw.githubusercontent.com/beak2825/beak2825.github.io/refs/heads/main/words.txt" target="_blank" style="color:#a78bfa">beak2825's massive word list</a><br>
            Share this page → Discord shows a clean image embed (the Discord trick!)
        </div>
    </div>

    <script>
        let words = [];
        
        async function loadWords() {
            const loadingEl = document.getElementById('word');
            loadingEl.textContent = 'loading the massive vault...';
            
            try {
                // Fetch the exact raw file you linked
                const response = await fetch('https://raw.githubusercontent.com/beak2825/beak2825.github.io/refs/heads/main/words.txt');
                const text = await response.text();
                
                // Split, clean, and filter empty lines
                words = text.split('\n')
                    .map(w => w.trim())
                    .filter(w => w.length > 0);
                
                console.log(`Loaded ${words.length} words!`);
                
                // Show first random word immediately
                newWord();
                
            } catch (err) {
                console.error(err);
                loadingEl.textContent = 'Failed to load words 😢 (check console)';
            }
        }
        
        function newWord() {
            if (words.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * words.length);
            const selectedWord = words[randomIndex];
            
            const wordEl = document.getElementById('word');
            wordEl.style.opacity = '0';
            
            setTimeout(() => {
                wordEl.textContent = selectedWord;
                wordEl.style.opacity = '1';
            }, 150);
        }
        
        function copyWord() {
            const word = document.getElementById('word').textContent;
            if (word && word !== 'loading the vault...') {
                navigator.clipboard.writeText(word).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    const original = btn.textContent;
                    btn.textContent = '✅ Copied!';
                    setTimeout(() => btn.textContent = original, 1500);
                });
            }
        }
        
        // Keyboard shortcut: press any key for new word
        document.addEventListener('keydown', (e) => {
            if (e.key.length === 1) newWord(); // any printable key
        });
        
        // Load on start
        window.onload = loadWords;
    </script>
</body>
</html>
